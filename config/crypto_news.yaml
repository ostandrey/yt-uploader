channel_name: "Crypto/Finance News"
settings:
  visual_source: "stock"    # Real stock content preferred for finance
  voiceover: true
  voice: "MaleVoice"
  music: "neutral_background"
  schedule: "2_per_day"
  video_duration: "30-60"
  quality_check: true
  auto_upload: false        # Start with manual approval

content:
  topics:
    - "Bitcoin price analysis"
    - "Ethereum updates and developments"
    - "Crypto market news and trends"
    - "Altcoins performance and analysis"
    - "DeFi protocol updates"
    - "NFT market trends"
    - "Stock market highlights"
    - "Investment strategies"
    - "Regulatory crypto news"
    - "Blockchain technology updates"
    - "Crypto exchange news"
    - "Mining and staking updates"
  
  sources:
    - "coindesk"
    - "cointelegraph"
    - "bitcoin_com"
    - "reddit_cryptocurrency"
    - "twitter_crypto_trends"
    - "binance_news"
    - "coinbase_blog"
  
  filters:
    min_engagement: 50
    exclude_keywords: ["scam", "fake", "pump_and_dump", "illegal"]
    preferred_keywords: ["bitcoin", "ethereum", "crypto", "blockchain", "defi", "nft"]

automation:
  retry_failed: 3
  backup_enabled: true
  log_level: "INFO"

