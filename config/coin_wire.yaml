channel_name: "Coin Wire"
brand:
  telegram: "@coinwirenews"
  youtube: "Coin Wire"
  language: "en"
  audience: "en"   # English-speaking — US/UK/global
  disclaimer: "Not financial advice. News and education only."

settings:
  visual_source: "stock_video"
  voiceover: true
  voice: "en-US-ChristopherNeural"
  voice_rate: "+8%"   # was -8% (too slow for news Shorts); +8% ≈ brisk CTV pace
  price_overlay: true
  video_format: "9:16"
  resolution: "1080x1920"
  video_duration: "25-40"
  auto_upload: false
  quality_check: true
  renderer: "ffmpeg"

content:
  topics:
    - "Bitcoin and major crypto price moves"
    - "Federal Reserve and macro economic news"
    - "Regulation and SEC news"
    - "ETF flows and institutional moves"
    - "DeFi and Ethereum ecosystem updates"

  rss_feeds:
    coindesk: "https://www.coindesk.com/arc/outboundfeeds/rss/"
    cointelegraph: "https://cointelegraph.com/rss"
    the_block: "https://www.theblock.co/rss.xml"
    decrypt: "https://decrypt.co/feed"

  filters:
    short_min_score: 12
    telegram_min_score: 6
    short_max_age_hours: 24
    telegram_max_age_hours: 48
    exclude_keywords: ["buy now", "sell now", "100x", "pump", "signal", "memecoin"]
    preferred_keywords: ["bitcoin", "ethereum", "fed", "sec", "etf", "regulation", "billion"]

  copy_llm:
    enabled: true              # uses COPY_LLM_API_KEY when set; rules fallback otherwise

publishing:
  telegram:
    enabled: true
    min_posts_per_day: 3
    max_posts_per_day: 8
    breaking_score: 22       # post ASAP on next poll
    strong_score: 15         # post when cooldown elapsed
    insight_score: 18        # include "Takeaway" block
    post_cooldown_minutes: 90
    poll_interval_minutes: 30
    max_posts_by_noon: 3      # before 12:00 ET — no morning spam
    max_posts_by_evening: 6    # before 18:00 ET — reserve for afternoon
  youtube:
    enabled: true
    shorts_per_day: 2
    upload_privacy: "unlisted"
    auto_upload: true
    auto_publish_scheduled: true   # publish PUBLIC after delay (kill switch below)
    auto_publish_delay_minutes: 30  # let YouTube finish processing
    publish_poll_minutes: 5        # worker checks queue every N min
    bot_poll_seconds: 20            # listen for /autopublish commands
  tiktok:
    enabled: true
    privacy_level: "PUBLIC_TO_EVERYONE"   # unaudited apps may require SELF_ONLY
  instagram:
    enabled: true                         # needs META_ACCESS_TOKEN + INSTAGRAM_USER_ID + R2
    reel: true                            # publish Short as Reel
    feed_image: true                      # stock photo + headline overlay (Pexels/Pixabay)
    carousel: true                        # sometimes 2-slide carousel (headline + extra photo)
    carousel_rate: 0.35
  threads:
    enabled: true                         # needs THREADS_* credentials
    mode: text                            # text-only (no native video for now)
    engagement_questions: true
    question_rate: 0.25
    news_pulse:
      enabled: true
      min_tier: strong
      max_per_day: 3
      cooldown_minutes: 120
      question_rate: 0.25

# Local B-roll auto-fill (Pexels/Pixabay → folders → ffprobe + YOLO marks rejects)
broll_library:
  auto_fill: true
  sources: ["pexels", "pixabay"]   # Coverr later
  max_clips_per_category: 40
  max_downloads_per_run: 20
  min_duration_sec: 5
  max_duration_sec: 30
  prefer_portrait: true
  run_yolo_on_fill: true           # needs: pip install ultralytics opencv-python-headless
  move_rejects: true               # bad clips → category/_rejected/
  scored_pick: true                # prefer has_screen / good_for_hook
  rotate_used_clips: true          # persist used ids under data/storage/coin_wire/
  clip_index: true                 # python scripts/index_broll_library.py

automation:
  timezone: "America/New_York"   # US Eastern — primary English crypto audience
  retry_failed: 3
  log_level: "INFO"
  storage:
    retention_days: 7          # delete local MP4 + render dirs older than this
    cleanup_time: "03:00"      # daily cleanup (channel timezone)
  schedule:
    telegram_floor: ["08:00", "12:00", "17:00"]   # minimum posts by these times
    shorts: ["09:00", "18:00"]             # morning + evening scroll
